name: dev-tools
description: "Agent Alchemy Dev Tools — dev utilities, debugging, and workflow enhancements"
source:
  platform: "Claude Code"
  plugin: "agent-alchemy-dev-tools"
  version: "0.3.3"
converted: "2026-03-03"

components:
  skills:
    - name: feature-dev
      file: skills/feature-dev/SKILL.md
      description: "Feature development workflow with exploration, architecture, implementation, and review phases"

    - name: bug-killer
      file: skills/bug-killer/SKILL.md
      description: "Systematic, hypothesis-driven debugging workflow with triage-based track routing"
      references:
        - name: python-debugging
          file: skills/bug-killer/references/python-debugging.md
          used_by: [bug-killer]
        - name: typescript-debugging
          file: skills/bug-killer/references/typescript-debugging.md
          used_by: [bug-killer]

    - name: architecture-patterns
      file: skills/architecture-patterns/SKILL.md
      description: "Architectural pattern knowledge for designing feature implementations"

    - name: code-quality
      file: skills/code-quality/SKILL.md
      description: "Code quality principles including SOLID, DRY, testing strategies, and best practices"

    - name: project-learnings
      file: skills/project-learnings/SKILL.md
      description: "Captures project-specific patterns and anti-patterns into the project knowledge base"

    - name: changelog-format
      file: skills/changelog-format/SKILL.md
      description: "Keep a Changelog format guidelines and entry writing best practices"

    - name: docs-manager
      file: skills/docs-manager/SKILL.md
      description: "Documentation management workflow for MkDocs sites and standalone markdown files"
      references:
        - name: markdown-file-templates
          file: skills/docs-manager/references/markdown-file-templates.md
          used_by: [docs-manager, docs-writer]

    - name: release-python-package
      file: skills/release-python-package/SKILL.md
      description: "Python package release workflow with verification steps"

    - name: document-changes
      file: skills/document-changes/SKILL.md
      description: "Generate markdown report documenting codebase changes from the current session"

  agents:
    - name: code-reviewer
      file: agents/code-reviewer.md
      description: "Reviews code implementations for correctness, security, maintainability with confidence-scored findings"
      role: reviewer

    - name: bug-investigator
      file: agents/bug-investigator.md
      description: "Executes diagnostic investigation tasks to test debugging hypotheses"
      role: investigator

    - name: changelog-manager
      file: agents/changelog-manager.md
      description: "Reviews git history and updates CHANGELOG.md with entries for [Unreleased] section"
      role: writer

    - name: docs-writer
      file: agents/docs-writer.md
      description: "Generates MkDocs-flavored or standard GitHub-flavored Markdown documentation"
      role: writer

dependencies:
  internal:
    - from: feature-dev
      to: architecture-patterns
      relationship: "Loads for architecture design guidance in Phase 4"
    - from: feature-dev
      to: code-quality
      relationship: "Loads for quality review guidance in Phase 6"
    - from: feature-dev
      to: changelog-format
      relationship: "Loads for changelog entry writing in Phase 7"
    - from: feature-dev
      to: code-reviewer agent
      relationship: "Delegates to 3 instances for parallel code review in Phase 6"
    - from: bug-killer
      to: code-quality
      relationship: "Loads for fix quality check in Phase 4.5 (deep track)"
    - from: bug-killer
      to: project-learnings
      relationship: "Loads for capturing debugging discoveries in Phase 5"
    - from: bug-killer
      to: bug-investigator agent
      relationship: "Delegates to 1-3 instances for hypothesis testing in Phase 3 (deep track)"
    - from: docs-manager
      to: docs-writer agent
      relationship: "Delegates to for content generation in Phase 5"
    - from: docs-manager
      to: changelog-format
      relationship: "Referenced for change summary template guidance"
    - from: release-python-package
      to: changelog-manager agent
      relationship: "Delegates to for changelog updates in Step 5"
    - from: changelog-manager agent
      to: changelog-format
      relationship: "References for entry writing guidelines"

  external:
    - from: feature-dev
      to: deep-analysis
      source_plugin: "core-tools"
      relationship: "Delegates to for codebase exploration in Phase 2"
      note: "Not included — convert core-tools separately if needed"
    - from: feature-dev
      to: language-patterns
      source_plugin: "core-tools"
      relationship: "Loads for language-specific pattern guidance in Phase 4"
      note: "Not included — convert core-tools separately if needed"
    - from: feature-dev
      to: technical-diagrams
      source_plugin: "core-tools"
      relationship: "Loads for Mermaid diagram styling in Phase 4"
      note: "Not included — convert core-tools separately if needed"
    - from: feature-dev
      to: code-architect agent
      source_plugin: "core-tools"
      relationship: "Delegates to 2-3 instances for architecture design in Phase 4"
      note: "Not included — convert core-tools separately if needed"
    - from: bug-killer
      to: code-explorer agent
      source_plugin: "core-tools"
      relationship: "Delegates to 2-3 instances for deep track investigation in Phase 2"
      note: "Not included — convert core-tools separately if needed"
    - from: docs-manager
      to: deep-analysis
      source_plugin: "core-tools"
      relationship: "Delegates to for codebase exploration in Phase 3"
      note: "Not included — convert core-tools separately if needed"
    - from: docs-manager
      to: code-explorer agent
      source_plugin: "core-tools"
      relationship: "Delegates to for change summary analysis in Phase 3"
      note: "Not included — convert core-tools separately if needed"
    - from: docs-writer agent
      to: technical-diagrams
      source_plugin: "core-tools"
      relationship: "References for Mermaid diagram styling conventions"
      note: "Not included — convert core-tools separately if needed"
