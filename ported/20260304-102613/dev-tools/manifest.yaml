name: dev-tools
description: "Agent Alchemy Dev Tools — dev utilities, debugging, and workflow enhancements"
mode: "flatten"
source:
  platform: "Claude Code"
  plugin: "agent-alchemy-dev-tools"
  version: "0.3.3"
converted: "2026-03-04"

components:
  skills:
    - name: feature-dev
      file: skills/feature-dev/SKILL.md
      description: "Feature development workflow with exploration, architecture, implementation, and review phases"
      origin: skill
    - name: bug-killer
      file: skills/bug-killer/SKILL.md
      description: "Systematic, hypothesis-driven debugging workflow with triage-based track routing"
      origin: skill
      references:
        - name: python-debugging
          file: skills/bug-killer/references/python-debugging.md
          used_by: [bug-killer]
        - name: typescript-debugging
          file: skills/bug-killer/references/typescript-debugging.md
          used_by: [bug-killer]
    - name: code-quality
      file: skills/code-quality/SKILL.md
      description: "Provides code quality principles including SOLID, DRY, testing strategies, and best practices"
      origin: skill
    - name: architecture-patterns
      file: skills/architecture-patterns/SKILL.md
      description: "Provides architectural pattern knowledge for designing feature implementations"
      origin: skill
    - name: docs-manager
      file: skills/docs-manager/SKILL.md
      description: "Documentation management workflow for MkDocs sites and standalone markdown files"
      origin: skill
      references:
        - name: markdown-file-templates
          file: skills/docs-manager/references/markdown-file-templates.md
          used_by: [docs-manager]
    - name: changelog-format
      file: skills/changelog-format/SKILL.md
      description: "Keep a Changelog format guidelines and entry writing best practices"
      origin: skill
    - name: project-learnings
      file: skills/project-learnings/SKILL.md
      description: "Captures project-specific patterns and anti-patterns into project documentation"
      origin: skill
    - name: document-changes
      file: skills/document-changes/SKILL.md
      description: "Generate a markdown report documenting codebase changes from the current session"
      origin: skill
    - name: release
      file: skills/release/SKILL.md
      description: "Prepare and execute a Python package release with verification steps"
      origin: skill
    - name: code-reviewer
      file: skills/code-reviewer/SKILL.md
      description: "Reviews code implementations for correctness, security, maintainability with confidence-scored findings (converted from agent)"
      origin: agent
    - name: bug-investigator
      file: skills/bug-investigator/SKILL.md
      description: "Executes diagnostic investigation tasks to test debugging hypotheses (converted from agent)"
      origin: agent
    - name: docs-writer
      file: skills/docs-writer/SKILL.md
      description: "Generates MkDocs-flavored or standard GitHub-flavored Markdown documentation (converted from agent)"
      origin: agent
    - name: changelog-manager
      file: skills/changelog-manager/SKILL.md
      description: "Reviews git history and updates CHANGELOG.md with entries for [Unreleased] section (converted from agent)"
      origin: agent

dependencies:
  internal:
    - from: feature-dev
      to: architecture-patterns
      relationship: "Loads for architecture design guidance"
    - from: feature-dev
      to: code-quality
      relationship: "Loads for implementation quality review"
    - from: feature-dev
      to: code-reviewer
      relationship: "Delegates code review to parallel specialists"
    - from: feature-dev
      to: changelog-format
      relationship: "Loads for changelog entry writing"
    - from: bug-killer
      to: code-quality
      relationship: "Loads for fix quality validation (deep track)"
    - from: bug-killer
      to: project-learnings
      relationship: "Loads to capture debugging discoveries"
    - from: bug-killer
      to: bug-investigator
      relationship: "Delegates hypothesis testing to parallel investigators"
    - from: docs-manager
      to: docs-writer
      relationship: "Delegates content generation to writer agents"
    - from: release
      to: changelog-manager
      relationship: "Delegates changelog update before release"
  external:
    - from: feature-dev
      to: deep-analysis
      source_plugin: "core-tools"
      relationship: "Loads for codebase exploration in Phase 2"
      note: "Convert core-tools separately if needed"
    - from: feature-dev
      to: language-patterns
      source_plugin: "core-tools"
      relationship: "Loads for language-specific implementation guidance"
      note: "Convert core-tools separately if needed"
    - from: feature-dev
      to: technical-diagrams
      source_plugin: "core-tools"
      relationship: "Loads for architecture proposal diagrams"
      note: "Convert core-tools separately if needed"
    - from: feature-dev
      to: code-architect
      source_plugin: "core-tools"
      relationship: "Delegates architecture design to parallel specialists"
      note: "Convert core-tools separately if needed"
    - from: bug-killer
      to: code-explorer
      source_plugin: "core-tools"
      relationship: "Delegates codebase exploration in deep track"
      note: "Convert core-tools separately if needed"
    - from: docs-manager
      to: deep-analysis
      source_plugin: "core-tools"
      relationship: "Loads for codebase understanding before doc generation"
      note: "Convert core-tools separately if needed"
    - from: docs-writer
      to: technical-diagrams
      source_plugin: "core-tools"
      relationship: "Preloaded knowledge for diagram generation in docs"
      note: "Convert core-tools separately if needed"
