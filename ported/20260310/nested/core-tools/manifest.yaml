      relationship: "Loads for codebase exploration"
    - from: codebase-analysis
      to: technical-diagrams
      relationship: "Loads for report diagrams"
    - from: code-architect
      to: technical-diagrams
      relationship: "Preloaded for blueprint diagrams"
    - from: code-explorer
      to: project-conventions
      relationship: "Preloaded for convention matching"
    - from: code-explorer
      to: language-patterns
      relationship: "Preloaded for language patterns"
    - from: code-synthesizer
      to: project-conventions
      relationship: "Preloaded for convention matching"
    - from: code-synthesizer
      to: language-patterns
      relationship: "Preloaded for language patterns"
    - from: code-synthesizer
      to: technical-diagrams
      relationship: "Preloaded for analysis diagrams"
