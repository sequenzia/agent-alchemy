    - name: project-conventions
      file: skills/project-conventions/SKILL.md
      description: "Project-specific convention discovery and application"
      origin: skill
    - name: technical-diagrams
      file: skills/technical-diagrams/SKILL.md
      description: "Mermaid diagram syntax, styling rules, and best practices"
      origin: skill
      references:
        - name: flowcharts
          file: skills/technical-diagrams/references/flowcharts.md
          used_by: [technical-diagrams]
        - name: sequence-diagrams
          file: skills/technical-diagrams/references/sequence-diagrams.md
          used_by: [technical-diagrams]
        - name: class-diagrams
          file: skills/technical-diagrams/references/class-diagrams.md
          used_by: [technical-diagrams]
        - name: state-diagrams
          file: skills/technical-diagrams/references/state-diagrams.md
          used_by: [technical-diagrams]
        - name: er-diagrams
          file: skills/technical-diagrams/references/er-diagrams.md
          used_by: [technical-diagrams]
        - name: c4-diagrams
          file: skills/technical-diagrams/references/c4-diagrams.md
          used_by: [technical-diagrams]
    - name: deep-analysis
      file: skills/deep-analysis/SKILL.md
      description: "Deep exploration and synthesis workflow with hub-and-spoke coordination"
      origin: skill
      nested_agents:
        - name: code-explorer
          file: skills/deep-analysis/agents/code-explorer.md
          description: "Explores codebases to find relevant files, trace execution paths, and map architecture"
          origin: agent
          role: explorer
        - name: code-synthesizer
          file: skills/deep-analysis/agents/code-synthesizer.md
          description: "Synthesizes exploration findings into unified analysis with deep investigation"
          origin: agent
          role: synthesizer
    - name: codebase-analysis
      file: skills/codebase-analysis/SKILL.md
      description: "Structured codebase analysis report with architecture overview and recommendations"
      origin: skill
      nested_agents:
        - name: code-architect
          file: skills/codebase-analysis/agents/code-architect.md
          description: "Designs implementation blueprints for features"
          origin: agent
          role: architect
    - name: lifecycle-hooks
      file: skills/lifecycle-hooks/SKILL.md
      description: "Behavioral rules and lifecycle event handlers for the core-tools package (converted from hooks)"
      origin: hooks
      references:
        - name: auto-approve-da-session
          file: skills/lifecycle-hooks/references/auto-approve-da-session.sh
          used_by: [lifecycle-hooks]

dependencies:
