name: core-tools
description: "Codebase analysis, deep exploration, language patterns, and technical diagrams"
mode: "nested"
source:
  platform: "Claude Code"
  plugin: "agent-alchemy-core-tools"
  version: "0.2.3"
converted: "2026-03-10"

components:
